syntax = "proto3";

package todo;

service TodoService {
  rpc CreateTodo(CreateTodoRequest) returns (Todo);
  rpc ListTodos(Empty) returns (TodoList);
  rpc ToggleComplete(TodoIdRequest) returns (Todo);
  rpc DeleteTodo(TodoIdRequest) returns (Empty);
  rpc UpdateTodo(UpdateTodoRequest) returns (Todo);
}

message CreateTodoRequest {
  string title = 1;
  string description = 2;
  string priority = 3;     // Alta, Media, Baja
  string due_date = 4;     // YYYY-MM-DD
}

message UpdateTodoRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  string priority = 4;
  string due_date = 5;
  bool completed = 6;
}

message TodoIdRequest {
  string id = 1;
}

message Todo {
  string id = 1;
  string title = 2;
  string description = 3;
  string priority = 4;
  string due_date = 5;
  bool completed = 6;
  string created_at = 7;
}

message TodoList {
  repeated Todo todos = 1;
}

message Empty {}