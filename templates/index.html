<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ToDo List gRPC</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-2xl mx-auto mt-10 p-6 bg-white rounded-xl shadow">
    <h1 class="text-3xl font-bold text-center mb-6">ToDo List</h1>
    
    <form id="addForm" class="flex gap-2 mb-6">
      <input id="title" type="text" placeholder="Nueva tarea..." 
             class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
      <button type="submit" 
              class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
        Agregar
      </button>
    </form>

    <ul id="todoList" class="space-y-2"></ul>
  </div>

  <script>
    const list = document.getElementById('todoList');
    const form = document.getElementById('addForm');

    async function loadTodos() {
      const res = await fetch('/api/todos');
      const todos = await res.json();
      list.innerHTML = '';
      todos.forEach(todo => {
        const li = document.createElement('li');
        li.className = `flex items-center justify-between p-4 rounded-lg ${todo.completed ? 'bg-green-100 line-through' : 'bg-gray-50'}`;
        li.innerHTML = `
          <div class="flex items-center gap-3">
            <input type="checkbox" ${todo.completed ? 'checked' : ''} 
                   onchange="toggle('${todo.id}')" class="w-5 h-5">
            <span class="text-lg">${todo.title}</span>
          </div>
          <button onclick="deleteTodo('${todo.id}')" 
                  class="text-red-600 hover:text-red-800">🗑</button>
        `;
        list.appendChild(li);
      });
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const title = document.getElementById('title').value;
      if (!title) return;
      await fetch('/api/todos', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title})
      });
      document.getElementById('title').value = '';
      loadTodos();
    });

    async function toggle(id) {
      await fetch(`/api/todos/${id}/toggle`, {method: 'POST'});
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`/api/todos/${id}`, {method: 'DELETE'});
      loadTodos();
    }

    // Cargar al inicio
    loadTodos();
  </script>
</body>
</html>
